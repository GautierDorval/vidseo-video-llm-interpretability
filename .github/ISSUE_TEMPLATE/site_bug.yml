name: Site bug
description: Report a bug in the static site or metadata layer
title: "[site] "
labels: ["bug", "site"]
body:
  - type: input
    id: url
    attributes:
      label: URL or path
      placeholder: /faq/ or /fr/documentation/
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is wrong?
    validations:
      required: true
